<!DOCTYPE html>
<html amp lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href=".">
    <title>Shivam JCOB: Banana Pursuit</title>
    
    <!-- Mandatory AMP Core JS Library -->
    <script async src="https://cdn.ampproject.org/v0.js"></script>
    
    <!-- Mandatory Extension for Handling Secure Frames -->
    <script async custom-element="amp-iframe" src="https://cdn.ampproject.org/v0.js/amp-iframe-0.1.js"></script>
    
    <!-- Mandatory Boilerplate CSS Styling required by AMP Validation -->
    <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>
    
    <!-- Validated Custom Layout Styles -->
    <style amp-custom>
        body {
            margin: 0;
            background: #0d0c1d;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 900px;
            padding: 10px;
            box-sizing: border-box;
        }
        .game-wrapper {
            position: relative;
            box-shadow: 0 30px 70px rgba(0,0,0,0.6);
            background: #141226;
            border-radius: 32px;
            overflow: hidden;
            width: 100%;
        }
        .instructions {
            margin-top: 25px;
            color: #64748b;
            font-size: 14px;
            text-align: center;
            width: 100%;
        }
        .instructions b {
            color: #ffffff;
            background: rgba(255,255,255,0.1);
            padding: 3px 8px;
            border-radius: 6px;
        }

        /* --- Artistic Intro Animation Elements --- */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0d0c1d;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            /* Animation to sweep the curtain away */
            animation: hideOverlay 0.8s cubic-bezier(0.77, 0, 0.175, 1) 3s forwards;
        }

        .intro-title {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(45deg, #ffde17, #ff4e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Glow and Pop effect */
            animation: titleReveal 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s both,
                       pulseGlow 2s ease-in-out infinite alternate;
        }

        .intro-subtitle {
            font-size: 1rem;
            color: #64748b;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: fadeIn 1s ease-out 1s both;
        }

        .intro-scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0) 95%,
                rgba(255, 222, 23, 0.04) 95%
            );
            background-size: 100% 4px;
        }

        /* --- Keyframe Definitions --- */
        @keyframes titleReveal {
            0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 5px rgba(255,222,23,0.2)); }
            100% { filter: drop-shadow(0 0 25px rgba(255,78,80,0.6)); }
        }

        @keyframes hideOverlay {
            0% { transform: translateY(0); opacity: 1; }
            99% { transform: translateY(-100%); opacity: 0; }
            100% { transform: translateY(-100%); opacity: 0; display: none; }
        }
    </style>
</head>
<body>

    <!-- Artistic Intro Layer -->
    <div class="intro-overlay">
        <div class="intro-scanline"></div>
        <div class="intro-title">Banana Pursuit</div>
        <div class="intro-subtitle">Shivam JCOB Edition</div>
    </div>

    <div class="container">
        <div class="game-wrapper">
            <!-- ⚡ FIXED: Uses relative path to guarantee same-environment serving on Vercel -->
            <amp-iframe width="900" height="450"
                sandbox="allow-scripts allow-forms allow-popups"
                layout="responsive"
                frameborder="0"
                src="./game-engine.html">
                <!-- Fallback layout block mandatory for AMP iframes close to viewports -->
                <div placeholder class="loading-placeholder" style="background:#141226;width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
                    🎬 LOADING BROWSER ENGINE...
                </div>
            </amp-iframe>
        </div>
        
        <div class="instructions">
            Press <b>SPACEBAR</b> or <b>UP ARROW</b> to jump. Dodge obstacles and floaters.<br>
            Cross <b>10,000 points</b> to awaken the 💖 Heartbreaker Queen Boss Fight!
        </div>
    </div>

</body>
</html>
