<!DOCTYPE html>
<html amp lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://web-games-mpgz.vercel.app/index.html">
    <title>Shivam JCOB: Banana Pursuit - Intro Fight</title>
    
    <!-- Mandatory AMP Core JS Library -->
    <script async src="https://cdn.ampproject.org/v0.js"></script>
    
    <!-- Mandatory Extension for Handling Secure Frames -->
    <script async custom-element="amp-iframe" src="https://cdn.ampproject.org/v0.js/amp-iframe-0.1.js"></script>
    
    <!-- Mandatory Boilerplate CSS Styling required by AMP Validation -->
    <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>
    
    <!-- Validated Custom Layout Styles -->
    <style amp-custom>
        body {
            margin: 0;
            background: #0d0c1d;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 900px;
            padding: 10px;
            box-sizing: border-box;
            opacity: 0;
            animation: fadeInContainer 0.5s ease-out 6s forwards;
        }
        .game-wrapper {
            position: relative;
            box-shadow: 0 30px 70px rgba(0,0,0,0.6);
            background: #141226;
            border-radius: 32px;
            overflow: hidden;
            width: 100%;
        }
        .instructions {
            margin-top: 25px;
            color: #64748b;
            font-size: 14px;
            text-align: center;
            width: 100%;
        }
        .instructions b {
            color: #ffffff;
            background: rgba(255,255,255,0.1);
            padding: 3px 8px;
            border-radius: 6px;
        }

        /* =========================================
           ARTISTIC INTRO ANIMATION 
           ========================================= */
        .intro-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #241f4a 0%, #0d0c1d 100%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            padding: 8vh 0; /* Keeps clear spacing from edges */
            pointer-events: none;
            animation: exitStage 1s steps(1) 6s forwards;
        }

        /* Safe Top Zone for Title & Queen */
        .title-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 1010;
        }

        .queen-icon {
            font-size: 70px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px #ff4e50);
            animation: queenPulse 2s infinite;
        }

        .title-card {
            opacity: 0;
            animation: titleReveal 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 4.2s forwards;
        }
        .title-main {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffde17, #ff4e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: 4px;
        }
        .title-sub {
            color: #64748b;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* Safe Isolated Bottom Zone for Fighting Ring */
        .fight-ring {
            position: relative;
            width: 100%;
            height: 200px; /* Locked height prevents drifting into text */
            margin-bottom: 5vh;
        }

        .fighter {
            position: absolute;
            font-size: 90px;
            bottom: 0;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Shivam (Black Gorilla) */
        .shivam {
            left: 15%;
            animation: 
                shivamEntry 1s ease-out 0.5s forwards,
                shivamFightSequence 4s linear 1.5s forwards;
        }

        /* Orange Ape */
        .ape {
            right: 15%;
            transform: scaleX(-1);
            animation: 
                apeEntry 1s ease-out 0.5s forwards,
                apeFightSequence 4s linear 1.5s forwards;
        }

        /* Hit FX Sparks (Anchored strictly inside combat zone) */
        .fx {
            position: absolute;
            font-size: 50px;
            opacity: 0;
            bottom: 30px;
            animation: fxSequence 4s linear 1.5s;
        }

        /* =========================================
           KEYFRAMES
           ========================================= */
        @keyframes fadeInContainer { to { opacity: 1; } }
        @keyframes exitStage { to { transform: translateY(-100%); display: none; } }
        @keyframes queenPulse { 
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px #ff4e50); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 35px #ff4e50); }
        }

        /* Entry Paths */
        @keyframes shivamEntry {
            0% { transform: translateX(-200px) rotate(-20deg); opacity: 0; }
            100% { transform: translateX(0) rotate(0deg); opacity: 1; }
        }
        @keyframes apeEntry {
            0% { transform: translateX(200px) scaleX(-1) rotate(20deg); opacity: 0; }
            100% { transform: translateX(0) scaleX(-1) rotate(0deg); opacity: 1; }
        }

        /* Combat Sequences */
        @keyframes shivamFightSequence {
            0% { left: 15%; }
            10% { left: 20%; }
            15% { left: 15%; }
            20% { left: 38%; transform: scale(1.1) rotate(10deg); }
            25% { left: 38%; }
            30% { left: 15%; transform: scale(1) rotate(0deg); }
            50% { transform: translateY(-60px); }
            60% { transform: translateY(0); }
            75% { left: 42%; transform: rotate(-15deg); }
            85% { left: 30%; opacity: 1; }
            100% { left: -250px; opacity: 0; }
        }

        @keyframes apeFightSequence {
            0% { right: 15%; }
            20% { right: 15%; transform: scaleX(-1) translateX(25px); }
            25% { right: 15%; transform: scaleX(-1); }
            40% { right: 38%; transform: scaleX(-1) scale(1.1); }
            55% { right: 15%; transform: scaleX(-1); }
            75% { right: 42%; transform: scaleX(-1) rotate(15deg); }
            85% { right: 30%; opacity: 1; }
            100% { right: -250px; opacity: 0; }
        }

        /* Clashed Hit FX Location */
        @keyframes fxSequence {
            0%, 19% { opacity: 0; left: 47%; transform: scale(0); }
            20% { opacity: 1; left: 47%; transform: scale(1.2); }
            23% { opacity: 0; left: 47%; transform: scale(1.6); }
            100% { opacity: 0; }
        }

        /* Title Reveal */
        @keyframes titleReveal {
            0% { opacity: 0; transform: translateY(-20px); filter: blur(5px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>
</head>
<body>

    <!-- Artistic Intro Layer -->
    <div class="intro-stage">
        <!-- Top Container: Separates Crown and Title from Fighters -->
        <div class="title-zone">
            <div class="queen-icon">💖</div>
            <div class="title-card">
                <h1 class="title-main">Banana Pursuit</h1>
                <div class="title-sub">Shivam JCOB Edition</div>
            </div>
        </div>

        <!-- Bottom Container: Isolated Combat Arena -->
        <div class="fight-ring">
            <div class="fighter shivam">🦍</div> 
            <div class="fighter ape">🦧</div>   
            <div class="fx">💥</div>
        </div>
    </div>

    <!-- Main Game Container -->
    <div class="container">
        <div class="game-wrapper">
            <amp-iframe width="900" height="450"
                sandbox="allow-scripts allow-forms allow-popups"
                layout="responsive"
                frameborder="0"
                src="./game-engine.html">
                <div placeholder class="loading-placeholder" style="background:#141226;width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
                    🎬 LOADING BROWSER ENGINE...
                </div>
            </amp-iframe>
        </div>
        
        <div class="instructions">
            Press <b>SPACEBAR</b> or <b>UP ARROW</b> to jump. Dodge obstacles and floaters.<br>
            Cross <b>10,000 points</b> to awaken the 💖 Heartbreaker Queen Boss Fight!
        </div>
    </div>

</body>
</html>
